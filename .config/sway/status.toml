icons_format = "{icon}"

[theme]
theme = "native"

[icons]
icons = "awesome6"
[icons.overrides]
backlight = ["\uf185"]

[[block]]
block = "pacman"
signal = 5
interval = 600
error_interval = 1200
format = " $icon $both "
format_singular = " $icon $both "
format_up_to_date = " $icon $both "
warning_updates_regex = "(linux|linux-lts|linux-zen)"
aur_command = "paru -Qua"
error_format = ""
[[block.click]]
button = "left"
update = true

[[block]]
block = "backlight"
device = "intel_backlight"
missing_format = ""
cycle = [20]

[[block]]
block = "battery"
device = "DisplayDevice"
driver = "upower"
format = " $icon $percentage "
charging_format = " $icon $percentage "
not_charging_format = " $icon $percentage "
missing_format = ""

[[block]]
block = "net"
format = " $icon $ssid "

[[block]]
block = "sound"
step_width = 1
[[block.click]]
button = "right"
cmd = "wpctl set-mute @DEFAULT_SINK@ toggle"

[[block]]
block = "time"
format = " $icon $timestamp.datetime(f:'%a %m/%d %H:%M:%S') "
interval = 1
